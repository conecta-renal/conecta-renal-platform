name: Ingest SIA-SUS (ATD)

on:
  workflow_dispatch:
    inputs:
      uf:
        description: "UF a ser processada"
        required: false
        default: "SP"
      meses:
        description: "Janela de meses anteriores à execução"
        required: false
        default: "3"

defaults:
  run:
    working-directory: pipelines/datasus

jobs:
  ingest:
    name: Run SIA-SUS (ATD) ingestion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATASUS_UF: ${{ github.event.inputs.uf }}
          DATASUS_MESES: ${{ github.event.inputs.meses }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python ingest_atd.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atd-ingest-logs
          path: pipelines/datasus/output/logs/*.log
